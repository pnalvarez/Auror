name: auror_design_system
description: >
  Auror UI kit — atoms (color, type, spacing), molecules, organisms, and DS sample demos.

version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
